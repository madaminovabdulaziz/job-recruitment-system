{% extends "base.html" %}

{% block title %}Withdraw application &middot; Recruitment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="mb-3">Withdraw application</h1>
        <p>Withdraw your application to
           <strong>{{ application.job.title }}</strong>
           at {{ application.job.company.name }}? This cannot be undone.</p>

        <form method="post" action="{% url 'withdraw' application.pk %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, withdraw</button>
            <a href="{% url 'my_applications' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
