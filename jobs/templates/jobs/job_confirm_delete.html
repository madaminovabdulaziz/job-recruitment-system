{% extends "base.html" %}

{% block title %}Delete Job &middot; Recruitment{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <h1 class="mb-3">Delete Job</h1>
        <p>Are you sure you want to delete <strong>{{ job.title }}</strong>?
           This cannot be undone.</p>

        <form method="post" action="{% url 'job_delete' job.pk %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{% url 'employer_jobs' %}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
